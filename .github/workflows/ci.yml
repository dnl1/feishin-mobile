name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  analyze-and-test:
    name: Analyze & test (Dart/Flutter, no platform build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Generate freezed/json_serializable/riverpod code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - run: flutter analyze

      - run: flutter test

  ios-build:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Generate freezed/json_serializable/riverpod code
        run: dart run build_runner build --delete-conflicting-outputs

      # Validates the app actually compiles for iOS on a real Apple toolchain
      # (the thing the Linux dev environment structurally cannot verify).
      # Signing/TestFlight upload is a separate release workflow, added in
      # phase 8 once there's an Apple Developer account to sign with.
      - run: flutter build ios --release --no-codesign

  ios-theme-screenshots:
    name: iOS theme screenshots (Simulator)
    runs-on: macos-latest
    needs: analyze-and-test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Generate freezed/json_serializable/riverpod code
        run: dart run build_runner build --delete-conflicting-outputs

      # "Layer 2" of the no-Mac-access verification strategy for the ported
      # themes (docs/STATUS.md, Fase 7): the Linux golden tests catch token
      # mapping bugs cheaply, but only a real iOS Simulator shows the actual
      # Xcode/UIKit rendering pipeline (fonts, dynamic type, dark mode).
      #
      # Picks the iPhone on the *highest* available iOS runtime rather than
      # just "any iPhone" — macos-latest ships several Xcode/runtime pairs,
      # and a device tied to a runtime the active Xcode toolchain doesn't
      # expect can boot fine per `simctl` but hang later when flutter's
      # build/install tooling tries to talk to it.
      - name: Boot an iOS Simulator
        id: simulator
        timeout-minutes: 5
        run: |
          xcrun simctl list devices available
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          best = None
          for runtime_id, devices in data['devices'].items():
              if 'iOS' not in runtime_id:
                  continue
              for d in devices:
                  if d['isAvailable'] and d['name'].startswith('iPhone'):
                      if best is None or runtime_id > best[0]:
                          best = (runtime_id, d['udid'])
          if best is None:
              sys.exit(1)
          print(best[1])
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl list devices booted

      - name: Run theme screenshots via flutter drive
        id: drive
        timeout-minutes: 15
        run: |
          set -o pipefail
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/theme_screenshots_test.dart \
            -d ${{ steps.simulator.outputs.udid }} \
            --verbose 2>&1 | tee flutter_drive.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: theme-screenshots-drive-log
          path: flutter_drive.log
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: theme-screenshots
          path: screenshots/
          if-no-files-found: warn
